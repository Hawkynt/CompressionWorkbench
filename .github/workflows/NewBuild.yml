name: Build and Release

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    # Needed for softprops/action-gh-release to create tags and releases.
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Update version numbers
      run: perl .github/workflows/UpdateVersions.pl .

    - name: Restore dependencies
      run: dotnet restore CompressionWorkbench.slnx

    - name: Build solution
      run: dotnet build CompressionWorkbench.slnx --configuration Release --no-restore

    - name: Publish SFX stubs into Lib resources
      shell: pwsh
      run: |
        # Disable strict native-command error handling so we collect all RID failures
        # instead of aborting on the first one; we report them explicitly at the end.
        $PSNativeCommandUseErrorActionPreference = $false

        $rids = @("win-x64", "win-x86", "win-arm64", "linux-x64", "linux-arm64")
        $stagingDir = "sfx-staging"
        $stubsDir = "Compression.Lib/stubs"
        $failures = @()

        # Phase 1: Publish all stubs to a staging directory (ExcludeStubs prevents
        # Compression.Lib from embedding previously-built stubs during publish,
        # avoiding Roslyn PE overflow on large assemblies).
        foreach ($rid in $rids) {
          $dest = "$stagingDir/$rid"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null

          Write-Host "::group::Publishing SFX CLI stub for $rid"
          dotnet publish Compression.Sfx.Cli/Compression.Sfx.Cli.csproj -r $rid -c Release -p:ExcludeStubs=true --nologo
          $cliExit = $LASTEXITCODE
          Write-Host "::endgroup::"
          $exeName = if ($rid.StartsWith("win")) { "sfx-cli.exe" } else { "sfx-cli" }
          $src = "Compression.Sfx.Cli/bin/Release/net10.0/$rid/publish/$exeName"
          if ($cliExit -eq 0 -and (Test-Path $src)) {
            Copy-Item $src $dest -Force
            Write-Host "  -> $dest/$exeName" -ForegroundColor Green
          } else {
            $failures += "Sfx.Cli/$rid (exit=$cliExit, missing=$src)"
            Write-Host "  -> FAILED (exit=$cliExit) for $rid" -ForegroundColor Red
          }

          if ($rid.StartsWith("win")) {
            Write-Host "::group::Publishing SFX UI stub for $rid"
            dotnet publish Compression.Sfx.Ui/Compression.Sfx.Ui.csproj -r $rid -c Release -p:ExcludeStubs=true --nologo
            $uiExit = $LASTEXITCODE
            Write-Host "::endgroup::"
            $src = "Compression.Sfx.Ui/bin/Release/net10.0-windows/$rid/publish/sfx-ui.exe"
            if ($uiExit -eq 0 -and (Test-Path $src)) {
              Copy-Item $src $dest -Force
              Write-Host "  -> $dest/sfx-ui.exe" -ForegroundColor Green
            } else {
              $failures += "Sfx.Ui/$rid (exit=$uiExit, missing=$src)"
              Write-Host "  -> FAILED (exit=$uiExit) for $rid" -ForegroundColor Red
            }
          }
        }

        # Phase 2: Copy all staged stubs into Compression.Lib/stubs/ for embedding
        if (Test-Path $stagingDir) {
          New-Item -ItemType Directory -Path $stubsDir -Force | Out-Null
          Copy-Item "$stagingDir/*" $stubsDir -Recurse -Force
          Remove-Item $stagingDir -Recurse -Force
          Write-Host "Stubs staged into $stubsDir" -ForegroundColor Green
        }

        if ($failures.Count -gt 0) {
          Write-Host ""
          Write-Host "=== SFX publish failures ===" -ForegroundColor Red
          $failures | ForEach-Object { Write-Host "  * $_" -ForegroundColor Red }
          exit 1
        }

    - name: Publish CLI for Windows x64 (single-file, self-contained)
      run: dotnet publish Compression.CLI/Compression.CLI.csproj -r win-x64 -c Release --self-contained --nologo

    - name: Publish CLI for Linux x64 (single-file, self-contained)
      run: dotnet publish Compression.CLI/Compression.CLI.csproj -r linux-x64 -c Release --self-contained --nologo

    - name: Publish UI for Windows x64 (single-file, self-contained)
      run: dotnet publish Compression.UI/Compression.UI.csproj -r win-x64 -c Release --self-contained --nologo

    - name: Extract version
      id: version
      shell: pwsh
      run: |
        $xml = [xml](Get-Content 'Directory.Build.props')
        $version = $xml.Project.PropertyGroup.Version
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "Version: $version"

    - name: Package Windows CLI
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $src = "Compression.CLI/bin/Release/net10.0/win-x64/publish/cwb.exe"
        Compress-Archive -Path $src -DestinationPath "CompressionWorkbench-CLI-win-x64-$version.zip"

    - name: Package Linux CLI
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $src = "Compression.CLI/bin/Release/net10.0/linux-x64/publish/cwb"
        Compress-Archive -Path $src -DestinationPath "CompressionWorkbench-CLI-linux-x64-$version.zip"

    - name: Package Windows UI
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $pubDir = "Compression.UI/bin/Release/net10.0-windows/win-x64/publish"
        $shellBuildDir = "Compression.Shell/bin/Release/net10.0-windows"
        $stageDir = "stage-ui"
        New-Item -ItemType Directory -Path $stageDir -Force | Out-Null

        Copy-Item "$pubDir/Compression.UI.exe" $stageDir -Force

        # COM host shim must live alongside exe for Explorer shell extension registration
        $comhost = "$shellBuildDir/Compression.Shell.comhost.dll"
        if (Test-Path $comhost) {
          Copy-Item $comhost $stageDir -Force
        }

        Compress-Archive -Path "$stageDir/*" -DestinationPath "CompressionWorkbench-UI-win-x64-$version.zip"

    - name: Upload Windows CLI
      uses: actions/upload-artifact@v4
      with:
        name: CompressionWorkbench-CLI-win-x64-${{ steps.version.outputs.VERSION }}
        path: CompressionWorkbench-CLI-win-x64-${{ steps.version.outputs.VERSION }}.zip

    - name: Upload Linux CLI
      uses: actions/upload-artifact@v4
      with:
        name: CompressionWorkbench-CLI-linux-x64-${{ steps.version.outputs.VERSION }}
        path: CompressionWorkbench-CLI-linux-x64-${{ steps.version.outputs.VERSION }}.zip

    - name: Upload Windows UI
      uses: actions/upload-artifact@v4
      with:
        name: CompressionWorkbench-UI-win-x64-${{ steps.version.outputs.VERSION }}
        path: CompressionWorkbench-UI-win-x64-${{ steps.version.outputs.VERSION }}.zip

    - name: Create Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v3
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: v${{ steps.version.outputs.VERSION }}
        body: |
          ## CompressionWorkbench v${{ steps.version.outputs.VERSION }}

          ### Installation
          1. Download the ZIP for your platform
          2. Extract and run

          ### Downloads
          - **Windows UI** — `Compression.UI.exe` — Archive browser, binary analysis wizard, Explorer shell extension
          - **Windows CLI** — `cwb.exe` — Command-line archive tool with SFX support
          - **Linux CLI** — `cwb` — Command-line archive tool with SFX support

          All executables are fully self-contained single files — no runtime installation needed.
        draft: false
        prerelease: false
        files: |
          CompressionWorkbench-CLI-win-x64-${{ steps.version.outputs.VERSION }}.zip
          CompressionWorkbench-CLI-linux-x64-${{ steps.version.outputs.VERSION }}.zip
          CompressionWorkbench-UI-win-x64-${{ steps.version.outputs.VERSION }}.zip
