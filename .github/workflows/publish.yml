name: Publish Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            cli-name: cwb.exe
            ui-project: Compression.UI
          - os: ubuntu-latest
            rid: linux-x64
            cli-name: cwb
            ui-project: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Publish CLI
        run: >
          dotnet publish Compression.CLI/Compression.CLI.csproj
          --configuration Release
          --self-contained
          --runtime ${{ matrix.rid }}
          --output publish/cli
          -p:DebugType=none
          -p:GenerateDocumentationFile=false

      - name: Publish UI (Windows only)
        if: matrix.os == 'windows-latest'
        run: >
          dotnet publish Compression.UI/Compression.UI.csproj
          --configuration Release
          --self-contained
          --runtime ${{ matrix.rid }}
          --output publish/ui
          -p:DebugType=none
          -p:GenerateDocumentationFile=false

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cwb-${{ matrix.rid }}
          path: publish/cli/${{ matrix.cli-name }}

      - name: Upload UI artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Compression.UI-${{ matrix.rid }}
          path: publish/ui/Compression.UI.exe
