name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  # release.yml calls this via `uses: ./.github/workflows/ci.yml` so tag
  # releases run the exact same test matrix as per-PR CI.
  workflow_call: {}

jobs:
  test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                          # version.pl needs full history

      # FileFormat.PngCrushAdapters has sibling-conditional ProjectReferences
      # to ..\..\PNGCrushCS\FileFormat.{Png,Apng,Jpeg,...}. Without the sibling
      # those types disappear and any test that imports them fails to compile.
      # Clone the sibling alongside CompressionWorkbench so the conditional
      # resolves to true and the full image-format surface is available on CI.
      - name: Clone PNGCrushCS sibling
        shell: bash
        run: git clone --depth 1 https://github.com/Hawkynt/PNGCrushCS.git "$GITHUB_WORKSPACE/../PNGCrushCS"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      # MSBuild does not reliably propagate $(Configuration) across solution-tree
      # boundaries; without this pre-build the sibling builds to bin/Debug/net8.0/
      # and the publish step then can't find Release/net8.0/ during bundling.
      - name: Pre-build PNGCrushCS sibling (Release)
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/../PNGCrushCS"
          for proj in Compression.Core FileFormat.Core FileFormat.Bmp FileFormat.Apng \
                      FileFormat.Tiff FileFormat.BigTiff FileFormat.Mng FileFormat.Fli \
                      FileFormat.Dcx FileFormat.Icns FileFormat.Mpo FileFormat.Jpeg \
                      FileFormat.Png; do
            echo "::group::Building $proj"
            dotnet build "$proj/$proj.csproj" --configuration Release --nologo
            echo "::endgroup::"
            test -f "$proj/bin/Release/net8.0/$proj.dll" || {
              echo "::error::Pre-build did not produce $proj/bin/Release/net8.0/$proj.dll"
              exit 1
            }
          done
          echo "All sibling Release DLLs verified."

      - name: Restore
        run: dotnet restore CompressionWorkbench.slnx

      - name: Build
        run: dotnet build CompressionWorkbench.slnx --configuration Release --no-restore

      # Core tests -- always run (no external tools required).
      - name: Core tests
        run: >
          dotnet test Compression.Tests
          --configuration Release --no-build
          --filter "Category!=EndToEnd&Category!=OsIntegration&Category!=ExternalInterop&Category!=PolyglotInterop"
          --logger "trx;LogFileName=core-tests.trx"

      # Interop tools for E2E tests.
      - name: Install interop tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y p7zip-full gzip bzip2 xz-utils zstd lz4 tar cpio genisoimage mtools qemu-utils

      - name: Install 7-Zip (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install 7zip -y

      - name: End-to-end interop tests
        continue-on-error: true
        run: >
          dotnet test Compression.Tests
          --configuration Release --no-build
          --filter "Category=EndToEnd"
          --logger "trx;LogFileName=e2e-tests.trx"

      - name: OS integration tests
        continue-on-error: true
        run: >
          dotnet test Compression.Tests
          --configuration Release --no-build
          --filter "Category=OsIntegration"
          --logger "trx;LogFileName=os-tests.trx"

      # Polyglot tests verify our formats round-trip through other language
      # ecosystems. Tests skip individually if the language package isn't
      # available; never call `pip install` etc. from inside a test.
      - name: Install polyglot test dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: |
          python3 -m pip install --user --break-system-packages py7zr zstandard brotli lz4 rarfile || true
          sudo cpanm --notest Archive::Zip IO::Compress::Lzma IO::Compress::Lzop || true
          gem install --user-install minitar rubyzip zstd-ruby || true
          npm install --prefix /tmp/polyglot-node adm-zip tar-stream || true
          echo "NODE_PATH=/tmp/polyglot-node/node_modules" >> $GITHUB_ENV

      - name: Polyglot interop tests
        continue-on-error: true
        run: >
          dotnet test Compression.Tests
          --configuration Release --no-build
          --filter "Category=PolyglotInterop"
          --logger "trx;LogFileName=polyglot-tests.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: '**/TestResults/*.trx'

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone PNGCrushCS sibling
        shell: bash
        run: git clone --depth 1 https://github.com/Hawkynt/PNGCrushCS.git "$GITHUB_WORKSPACE/../PNGCrushCS"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Pre-build PNGCrushCS sibling (Release)
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/../PNGCrushCS"
          for proj in Compression.Core FileFormat.Core FileFormat.Bmp FileFormat.Apng \
                      FileFormat.Tiff FileFormat.BigTiff FileFormat.Mng FileFormat.Fli \
                      FileFormat.Dcx FileFormat.Icns FileFormat.Mpo FileFormat.Jpeg \
                      FileFormat.Png; do
            echo "::group::Building $proj"
            dotnet build "$proj/$proj.csproj" --configuration Release --nologo
            echo "::endgroup::"
            test -f "$proj/bin/Release/net8.0/$proj.dll" || {
              echo "::error::Pre-build did not produce $proj/bin/Release/net8.0/$proj.dll"
              exit 1
            }
          done
          echo "All sibling Release DLLs verified."

      - name: Run tests with coverage
        run: >
          dotnet test Compression.Tests
          --configuration Release
          --filter "Category!=EndToEnd&Category!=OsIntegration&Category!=ExternalInterop&Category!=PolyglotInterop"
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage

      - name: Generate coverage report
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator -reports:./coverage/**/coverage.cobertura.xml -targetdir:./coverage/report -reporttypes:HtmlInline_AzurePipelines

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage/report
